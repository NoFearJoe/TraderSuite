name: TraderSuite

options:
  bundleIdPrefix: com.mesterra.tradersuite
  # Must match TraderSuiteKit/Package.swift (.iOS(.v26), .macOS(.v26)); the app
  # links those modules and uses iOS/macOS 26 APIs (e.g. glassEffect).
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  createIntermediateGroups: true

packages:
  TraderSuiteKit:
    path: TraderSuiteKit
  # AppMetrica analytics SDK. iOS/tvOS only — linked for iOS below and guarded
  # with `#if canImport(AppMetricaCore)` in App/AppMetricaAnalytics.swift so the
  # macOS build stays unaffected.
  AppMetrica:
    url: https://github.com/appmetrica/appmetrica-sdk-ios
    from: "6.0.0"

targets:
  TraderSuite:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: App
    dependencies:
      - package: TraderSuiteKit
        product: Features
      - package: AppMetrica
        product: AppMetricaCore
        destinationFilters: [iOS]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mesterra.tradersuite
        PRODUCT_NAME: TraderSuite
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        SWIFT_VERSION: "6.0"
        ENABLE_PREVIEWS: YES
        # Partial Info.plist (only UIBackgroundModes → remote-notification, needed by
        # CloudKit). GENERATE_INFOPLIST_FILE stays YES; Xcode merges the generated
        # keys into this file.
        INFOPLIST_FILE: App/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: TraderSuite
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.finance
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # CloudKit sync requires real signing (ad-hoc "-" can't carry the iCloud
        # entitlement), so the app target signs with a Development Team using
        # automatic signing. The CloudKit container + APS capability live in
        # TraderSuite.entitlements (referenced below). Keep this in sync with the
        # generated .xcodeproj — regenerating via `xcodegen generate` rewrites it.
        CODE_SIGN_ENTITLEMENTS: TraderSuite.entitlements
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "485UNLA592"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES

  # UI-test target that captures the App Store screenshot set. iOS only for now;
  # add `macOS` to supportedDestinations to extend it to the Mac App Store.
  TraderSuiteUITests:
    type: bundle.ui-testing
    supportedDestinations: [iOS]
    sources:
      - path: UITests
    dependencies:
      - target: TraderSuite
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mesterra.tradersuite.uitests
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        TEST_TARGET_NAME: TraderSuite
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES

schemes:
  TraderSuite:
    build:
      targets:
        TraderSuite: all
        TraderSuiteUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - TraderSuiteUITests
