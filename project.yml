name: TraderSuite

options:
  bundleIdPrefix: com.ilyakharabet.tradersuite
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  TraderSuiteKit:
    path: TraderSuiteKit

targets:
  TraderSuite:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: App
    dependencies:
      - package: TraderSuiteKit
        product: Features
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ilyakharabet.tradersuite
        PRODUCT_NAME: TraderSuite
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        SWIFT_VERSION: "6.0"
        ENABLE_PREVIEWS: YES
        INFOPLIST_KEY_CFBundleDisplayName: TraderSuite
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.finance
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        # Ad-hoc signing so the app builds & runs locally (this Mac + iOS Simulator)
        # without selecting a Development Team. To install on a physical iPhone,
        # open the project in Xcode → Signing & Capabilities → pick your Team.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES

schemes:
  TraderSuite:
    build:
      targets:
        TraderSuite: all
    run:
      config: Debug
    test:
      config: Debug
